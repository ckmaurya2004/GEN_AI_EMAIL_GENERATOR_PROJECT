

<!DOCTYPE html>
<html>
<head>

<title>AI Email Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow-lg">

<div class="card-header text-center bg-primary text-white">
<h3>AI Email Generator</h3>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Email Type</label>
<input type="text" name="email_type" class="form-control" placeholder="e.g. Leave Request">
</div>

<div class="mb-3">
<label class="form-label">Receiver</label>
<input type="text" name="receiver" class="form-control" placeholder="e.g. HOD">
</div>

<div class="mb-3">
<label class="form-label">Purpose</label>
<input type="text" name="purpose" class="form-control" placeholder="e.g. illness">
</div>

<div class="mb-3">
<label class="form-label">Sender</label>
<input type="text" name="sender" class="form-control" placeholder="Your Name">
</div>

<div class="text-center">
<button type="submit" class="btn btn-success px-4">
Generate Email
</button>
</div>

</form>

</div>
</div>

{% if email_text %}

<div class="card shadow-lg mt-4">

<div class="card-header bg-dark text-white">
Generated Email
</div>

<div class="card-body">

<div style="white-space: pre-line;">
    <p>{{ email_text|linebreaks }}</p>

</div>

</div>

</div>

{% endif %}

</div>

</div>

</div>

</body>
</html>
